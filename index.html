<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>С Днём Рождения, Илья!</title>
    <style>
        /* --- Базовые сбросы и общие стили --- */
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: white;
            user-select: none;
            background-color: #1a0000;
        }

        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            padding-top: 30px;
            position: relative;
            overflow-x: hidden;
        }

        /* --- ФОН (красный с кругами и искрами) --- */
        #bg-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 0;
            background: radial-gradient(circle at 50% 50%, #cc1100 0%, #660000 40%, #220000 100%);
        }

        #bg-container::before {
            content: "";
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 150vmax;
            height: 150vmax;
            background: radial-gradient(circle at center, rgba(200, 40, 40, 0.7) 0%, rgba(150, 0, 0, 0.3) 40%, transparent 70%);
            animation: pulseGlow 5s ease-in-out infinite;
            mix-blend-mode: screen;
            filter: blur(40px);
            pointer-events: none;
        }

        @keyframes pulseGlow {
            0% { opacity: 0.4; transform: translate(-50%, -50%) scale(1); }
            50% { opacity: 0.8; transform: translate(-50%, -50%) scale(1.2); }
            100% { opacity: 0.4; transform: translate(-50%, -50%) scale(1); }
        }

        #particleCanvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
        }

        /* --- Экран приветствия (красный фон) --- */
        #splash-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1000;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: radial-gradient(circle at 50% 50%, #cc1100 0%, #660000 40%, #220000 100%);
            transition: opacity 0.6s ease, transform 0.6s ease;
            pointer-events: all;
        }

        #splash-screen.hidden {
            opacity: 0;
            transform: scale(1.1);
            pointer-events: none;
        }

        #white-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 999;
            background-color: white;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.5s ease;
        }

        #white-overlay.active { opacity: 1; }

        .splash-gift-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .gift-wrapper {
            position: relative;
            display: inline-block;
        }

        .gift-emoji {
            font-size: 180px;
            position: relative;
            animation: bounce 3s infinite ease-in-out;
            z-index: 2;
        }

        .gift-glow {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 320px;
            height: 320px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(255,255,255,0.35) 0%, rgba(255,255,255,0) 70%);
            animation: glowPulse 2s infinite alternate ease-in-out;
            z-index: 1;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-25px); }
        }

        @keyframes glowPulse {
            0% { transform: translate(-50%, -50%) scale(0.9); opacity: 0.6; }
            100% { transform: translate(-50%, -50%) scale(1.2); opacity: 1; }
        }

        .splash-text {
            margin-top: 100px;
            font-size: 36px;
            font-weight: 700;
            letter-spacing: 2px;
            color: white;
            animation: blinkText 2s infinite ease-in-out;
            z-index: 1;
        }

        @keyframes blinkText {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }

        @media (max-width: 600px) {
            .gift-emoji { font-size: 140px; }
            .gift-glow { width: 240px; height: 240px; }
            .splash-text { margin-top: 80px; font-size: 28px; }
        }

        /* --- Основной контент --- */
        .wrapper {
            position: relative;
            z-index: 2;
            width: 100%;
            max-width: 600px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
            margin: 0;
            opacity: 0;
            transform: translateY(30px);
            transition: opacity 1s ease, transform 1s ease;
            pointer-events: none;
        }

        .wrapper.visible {
            opacity: 1;
            transform: translateY(0);
            pointer-events: all;
        }

        /* --- Бейдж (красный градиент) --- */
        .badge {
            background: linear-gradient(145deg, #8b0000, #cc1100);
            padding: 12px 24px;
            border-radius: 30px;
            font-size: 18px;
            display: flex;
            align-items: center;
            gap: 10px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
            margin-bottom: 25px;
            margin-top: 10px;
            font-weight: bold;
        }

        .badge span { font-size: 24px; }

        /* --- Карточка --- */
        .card-wrapper {
            position: relative;
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .card-container {
            position: relative;
            border-radius: 24px;
            overflow: hidden;
            touch-action: none;
            box-shadow: 0 15px 35px rgba(200, 50, 50, 0.5), inset 0 1px 0 rgba(255, 255, 255, 0.1);
            background: linear-gradient(145deg, #8b0000, #cc1100);
            transition: aspect-ratio 0.3s ease, width 0.3s ease;
            aspect-ratio: 1 / 1;
            max-width: 300px;
            width: 100%;
            touch-action: pan-y;
        }

        .card-content {
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            height: 100%;
            padding: 20px 20px 15px 20px;
            box-sizing: border-box;
            text-align: center;
        }

        .card-text {
            font-size: 15px;
            line-height: 1.6;
            font-weight: 400;
            text-align: left;
            white-space: pre-wrap;
            overflow-y: auto;
            flex-grow: 1;
            padding-right: 5px;
            max-height: 65%;
            padding-bottom: 5px;
            -webkit-overflow-scrolling: touch;
            touch-action: pan-y;
            opacity: 1;
            transform-origin: left center;
            transition: opacity 0.3s ease, transform 0.3s ease;
        }

        /* Увеличенный шрифт для поздравления Лизы Беляевой */
        .card-text.large-text {
            font-size: 22px;
            line-height: 1.7;
        }

        .card-text::-webkit-scrollbar { width: 4px; }
        .card-text::-webkit-scrollbar-track { background: rgba(255,255,255,0.05); border-radius: 4px; }
        .card-text::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.3); border-radius: 4px; }

        /* --- Ссылка со скрепкой (очень светлый серый) --- */
        .attachment-link {
            display: none;
            align-items: center;
            justify-content: center;
            gap: 8px;
            color: #e0e0e0;
            font-size: 13px;
            cursor: pointer;
            margin-top: 5px;
            opacity: 0.9;
            transition: opacity 0.3s, color 0.3s;
            text-decoration: none;
            flex-shrink: 0;
        }

        .attachment-link:hover {
            opacity: 1;
            color: #f0f0f0;
            text-decoration: underline;
        }

        .attachment-link svg { width: 18px; height: 18px; fill: currentColor; }

        /* --- Индикатор "Листай ниже . . ." --- */
        .scroll-indicator {
            display: none;
            text-align: center;
            font-size: 14px;
            color: rgba(255, 255, 255, 0.8);
            margin-top: 5px;
            flex-shrink: 0;
            letter-spacing: 0.5px;
        }

        .scroll-indicator .dot {
            display: inline-block;
            animation: dotBlink 1.4s infinite ease-in-out both;
        }
        .scroll-indicator .dot:nth-child(1) { animation-delay: -0.32s; }
        .scroll-indicator .dot:nth-child(2) { animation-delay: -0.16s; }
        .scroll-indicator .dot:nth-child(3) { animation-delay: 0s; }

        @keyframes dotBlink {
            0%, 80%, 100% { opacity: 0.2; transform: scale(0.8); }
            40% { opacity: 1; transform: scale(1.1); }
        }

        /* Кнопки навигации */
        .card-nav-btn {
            background: transparent;
            border: none;
            color: rgba(255, 255, 255, 0.8);
            font-size: 24px;
            cursor: pointer;
            padding: 5px;
            transition: transform 0.2s, opacity 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 10;
        }

        .card-nav-btn:active { transform: scale(0.9); opacity: 0.6; }

        .card-nav-btn.pc-left {
            position: absolute;
            left: -45px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 28px;
        }

        .card-nav-btn.pc-right {
            position: absolute;
            right: -45px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 28px;
        }

        .card-nav-btn.pc-left:active, .card-nav-btn.pc-right:active {
            transform: translateY(-50%) scale(0.9);
        }

        .mobile-nav-btn {
            display: none;
            background: transparent;
            border: none;
            color: rgba(255, 255, 255, 0.8);
            font-size: 28px;
            cursor: pointer;
            padding: 10px;
        }

        .mobile-nav-btn:active { transform: scale(0.9); opacity: 0.6; }

        .card-bottom {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 10px;
            margin-top: 5px;
            width: 100%;
            box-sizing: border-box;
            flex-shrink: 0;
        }

        .card-author { font-size: 14px; opacity: 0.7; font-weight: 300; }

        @media (max-width: 450px) {
            .mobile-nav-btn { display: flex; }
            .pc-nav-btn { display: none !important; }
            .card-container { max-width: 300px; aspect-ratio: 1 / 1; }
            .card-text.large-text { font-size: 18px; }
        }

        @media (min-width: 451px) and (orientation: landscape) {
            .card-container { max-width: 500px; aspect-ratio: 16 / 9; }
        }

        /* --- Индикатор прогресса --- */
        #progress-container {
            display: flex;
            justify-content: center;
            align-items: center;
            margin-top: 15px;
            height: 12px;
            width: 100%;
            max-width: 200px;
            opacity: 0;
            transition: opacity 2s ease;
            cursor: pointer;
        }

        #progress-container.active {
            transition: opacity 0.3s ease;
            opacity: 1;
        }

        #progress-track {
            position: relative;
            width: 100%;
            height: 4px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 2px;
            touch-action: none;
        }

        #progress-thumb {
            position: absolute;
            top: 50%;
            left: 0%;
            transform: translate(-50%, -50%);
            width: 12px;
            height: 12px;
            background: white;
            border-radius: 50%;
            box-shadow: 0 0 8px rgba(255, 255, 255, 0.5);
            transition: left 0.4s ease;
            cursor: grab;
            touch-action: none;
        }

        #progress-thumb:active { cursor: grabbing; }

        /* --- "ТЫ" и слова --- */
        .title-section {
            text-align: center;
            margin-top: 5px;
        }

        .title-section h1 {
            font-size: 48px;
            margin: 0;
            font-weight: 700;
            letter-spacing: 1px;
        }

        .word-container {
            height: 70px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            font-size: 32px;
            font-weight: 500;
            margin-top: 5px;
            position: relative;
        }

        #dynamic-word {
            transition: opacity 0.5s ease, font-size 0.5s ease, font-weight 0.5s ease;
            opacity: 1;
            color: #f6e9ff;
            text-shadow: 0 0 10px rgba(255,255,255,0.1);
        }

        /* --- x2 значок (светло-оранжевый) --- */
        #x2-badge {
            position: absolute;
            top: 8px;
            right: -30px;
            font-size: 22px;
            font-weight: 700;
            color: #ffaa66;
            opacity: 0;
            transform: translateY(-10px);
            transition: opacity 0.3s ease, transform 0.3s ease;
            pointer-events: none;
        }

        #x2-badge.show {
            opacity: 1;
            transform: translateY(0);
        }

        @media (max-width: 450px) {
            #x2-badge {
                right: -25px;
                font-size: 18px;
                top: 5px;
            }
        }

        /* Падающие котики */
        .falling-cat {
            position: fixed;
            z-index: 999;
            font-size: 60px;
            pointer-events: none;
            opacity: 1;
            animation: fallAndSpin 1.3s cubic-bezier(0.25, 0.46, 0.45, 0.94) forwards;
            animation-delay: 1.5s;
        }

        @keyframes fallAndSpin {
            0% { opacity: 1; transform: translateY(0) rotate(0deg) scale(1); }
            100% { opacity: 0; transform: translateY(100vh) rotate(1080deg) scale(0.5); }
        }

        @media (max-width: 450px) {
            .falling-cat { font-size: 45px; }
        }
    </style>
</head>
<body>

<!-- Фон (красный + частицы) -->
<div id="bg-container"></div>
<canvas id="particleCanvas"></canvas>

<!-- Экран приветствия -->
<div id="splash-screen">
    <div class="splash-gift-container">
        <div class="gift-wrapper">
            <div class="gift-glow"></div>
            <div class="gift-emoji">🎁</div>
        </div>
        <div class="splash-text">ЖМИ! ЖМИ!</div>
    </div>
</div>

<div id="white-overlay"></div>

<!-- Основной контент -->
<div class="wrapper" id="mainContent">
    <!-- Бейдж -->
    <div class="badge">
        <span>🥳</span> С Днём Рождения, Илья!
    </div>

    <!-- Карточка -->
    <div class="card-wrapper">
        <button class="card-nav-btn pc-nav-btn pc-left" onclick="changeSlide(-1)">&#10094;</button>
        
        <div class="card-container" id="card-container">
            <div class="card-content" id="card-content">
                <div class="card-text" id="message-text">Загрузка...</div>
                
                <!-- Индикатор "Листай ниже . . ." -->
                <div class="scroll-indicator" id="scroll-indicator">
                    Листай ниже <span class="dot">.</span><span class="dot">.</span><span class="dot">.</span>
                </div>

                <a class="attachment-link" id="attachment-link" href="#" target="_blank" rel="noopener noreferrer">
                    <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                        <path d="M16.5 6v11.5c0 2.21-1.79 4-4 4s-4-1.79-4-4V5a2.5 2.5 0 0 1 5 0v10.5c0 .55-.45 1-1 1s-1-.45-1-1V6H10v9.5a2.5 2.5 0 0 0 5 0V5c0-2.21-1.79-4-4-4S7 2.79 7 5v12.5c0 3.04 2.46 5.5 5.5 5.5s5.5-2.46 5.5-5.5V6h-1.5z"/>
                    </svg>
                    <span>А ещё тут что-то есть :)</span>
                </a>

                <div class="card-bottom">
                    <button class="card-nav-btn mobile-nav-btn" onclick="changeSlide(-1)">&#10094;</button>
                    <div class="card-author" id="message-author">Автор</div>
                    <button class="card-nav-btn mobile-nav-btn" onclick="changeSlide(1)">&#10095;</button>
                </div>
            </div>
        </div>

        <button class="card-nav-btn pc-nav-btn pc-right" onclick="changeSlide(1)">&#10095;</button>
    </div>

    <!-- Прогресс-бар -->
    <div id="progress-container">
        <div id="progress-track">
            <div id="progress-thumb"></div>
        </div>
    </div>

    <!-- Заголовок "ТЫ" + слова -->
    <div class="title-section">
        <h1>ТЫ</h1>
        <div class="word-container">
            <span id="dynamic-word">гений</span>
            <span id="x2-badge">×2</span>
        </div>
    </div>
</div>

<script>
    // ============================================================
    // Логика приветственного экрана
    // ============================================================
    const splashScreen = document.getElementById('splash-screen');
    const whiteOverlay = document.getElementById('white-overlay');
    const mainContent = document.getElementById('mainContent');

    function startApp(e) {
        e.stopPropagation();
        splashScreen.classList.add('hidden');
        whiteOverlay.classList.add('active');
        
        setTimeout(() => {
            splashScreen.style.display = 'none';
            whiteOverlay.classList.remove('active');
            mainContent.classList.add('visible');
            setTimeout(() => {
                whiteOverlay.style.display = 'none';
            }, 500);
        }, 600);
    }

    splashScreen.addEventListener('click', startApp);

    // ============================================================
    // Частицы (фон)
    // ============================================================
    const canvas = document.getElementById('particleCanvas');
    const ctx = canvas.getContext('2d');

    let width, height;

    function resize() {
        width = window.innerWidth;
        height = window.innerHeight;
        canvas.width = width;
        canvas.height = height;
        init();
    }
    window.addEventListener('resize', resize);

    const redPalette = [
        [0, 100, 50],
        [0, 90, 45],
        [0, 100, 40],
        [0, 80, 35],
        [0, 100, 30],
        [0, 90, 25],
        [0, 80, 20],
        [0, 100, 15],
        [0, 70, 10]
    ];

    const orangePalette = [
        [255, 140, 0],
        [255, 160, 20],
        [255, 180, 50],
        [255, 200, 80],
        [255, 120, 0],
        [255, 100, 0],
        [255, 220, 100],
        [230, 130, 0],
        [255, 150, 30],
        [255, 170, 60]
    ];

    class BrightCircle {
        constructor() {
            const corners = [
                { x: 0, y: 0 },
                { x: width, y: 0 },
                { x: width, y: height },
                { x: 0, y: height }
            ];
            const startCorner = corners[Math.floor(Math.random() * corners.length)];
            const endCorner = corners[Math.floor(Math.random() * corners.length)];

            this.startX = startCorner.x;
            this.startY = startCorner.y;
            this.targetX = endCorner.x;
            this.targetY = endCorner.y;

            this.x = this.startX;
            this.y = this.startY;

            this.minSize = 80 + Math.random() * 150;
            this.maxSize = 250 + Math.random() * 500;
            this.size = this.minSize + Math.random() * (this.maxSize - this.minSize);
            
            this.moveSpeed = 0.3 + Math.random() * 1.0;
            this.pulseSpeed = 0.001 + Math.random() * 0.004;
            this.pulsePhase = Math.random() * Math.PI * 2;

            const [h, s, l] = redPalette[Math.floor(Math.random() * redPalette.length)];
            this.hue = h;
            this.sat = s;
            this.light = l;
            this.color = `hsla(${h}, ${s}%, ${l}%, `;

            this.blurAmount = 20 + Math.random() * 30;
            this.opacity = 0.3 + Math.random() * 0.4;
        }

        update() {
            const dx = this.targetX - this.x;
            const dy = this.targetY - this.y;
            const dist = Math.sqrt(dx * dx + dy * dy);

            if (dist < 5) {
                const corners = [
                    { x: 0, y: 0 },
                    { x: width, y: 0 },
                    { x: width, y: height },
                    { x: 0, y: height }
                ];
                let newCorner;
                do {
                    newCorner = corners[Math.floor(Math.random() * corners.length)];
                } while (newCorner.x === this.targetX && newCorner.y === this.targetY);
                
                this.targetX = newCorner.x;
                this.targetY = newCorner.y;
                this.startX = this.x;
                this.startY = this.y;
            } else {
                const speed = Math.min(this.moveSpeed, dist);
                this.x += (dx / dist) * speed;
                this.y += (dy / dist) * speed;
            }

            this.size = this.minSize + (Math.sin(this.pulsePhase) * 0.5 + 0.5) * (this.maxSize - this.minSize);
            this.pulsePhase += this.pulseSpeed;
        }

        draw() {
            ctx.save();
            ctx.globalAlpha = this.opacity;
            ctx.filter = `blur(${this.blurAmount}px)`;
            
            const grad = ctx.createRadialGradient(this.x, this.y, 0, this.x, this.y, this.size);
            grad.addColorStop(0, this.color + `1)`);
            grad.addColorStop(0.6, this.color + `0.9)`);
            grad.addColorStop(1, this.color + `0)`);
            
            ctx.fillStyle = grad;
            ctx.beginPath();
            ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
            ctx.fill();
            ctx.restore();
        }
    }

    class Spark {
        constructor() {
            this.reset();
        }

        reset() {
            this.x = Math.random() * width;
            this.y = Math.random() * height;
            this.size = Math.random() * 2.5 + 1;
            this.speedX = (Math.random() - 0.5) * 1.2;
            this.speedY = (Math.random() - 0.5) * 1.2 - 0.3;
            this.opacity = Math.random() * 0.9 + 0.3;
            
            const [r, g, b] = orangePalette[Math.floor(Math.random() * orangePalette.length)];
            this.color = `${r}, ${g}, ${b}`;
            
            this.life = Math.random() * 120 + 60;
            this.maxLife = this.life;
            
            this.twinkleSpeed = 0.02 + Math.random() * 0.05;
            this.twinklePhase = Math.random() * Math.PI * 2;
        }

        update() {
            this.x += this.speedX;
            this.y += this.speedY;
            this.speedX += (Math.random() - 0.5) * 0.02;
            this.speedY += (Math.random() - 0.5) * 0.02;
            
            this.life--;
            this.twinklePhase += this.twinkleSpeed;
            
            const twinkle = Math.sin(this.twinklePhase) * 0.3 + 0.7;
            this.opacity = (this.life / this.maxLife) * 0.8 * twinkle;

            if (this.life <= 0 || this.x < -20 || this.x > width + 20 || this.y < -20 || this.y > height + 20) {
                this.reset();
            }
        }

        draw() {
            ctx.save();
            ctx.globalAlpha = this.opacity;
            ctx.shadowBlur = 12;
            ctx.shadowColor = `rgba(${this.color}, 0.9)`;
            ctx.beginPath();
            ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
            ctx.fillStyle = `rgba(${this.color}, 1)`;
            ctx.fill();
            ctx.restore();
        }
    }

    let circles = [];
    let sparks = [];

    function init() {
        circles = [];
        sparks = [];

        const circleCount = 6 + Math.floor(Math.random() * 4);
        for (let i = 0; i < circleCount; i++) {
            circles.push(new BrightCircle());
        }

        const sparkCount = Math.floor((width * height) / 12000) + 150;
        for (let i = 0; i < sparkCount; i++) {
            sparks.push(new Spark());
        }
    }

    function animateParticles() {
        ctx.clearRect(0, 0, width, height);
        
        circles.forEach(circle => {
            circle.update();
            circle.draw();
        });

        sparks.forEach(spark => {
            spark.update();
            spark.draw();
        });

        requestAnimationFrame(animateParticles);
    }

    animateParticles();

    // ============================================================
    // Логика переключения слайдов
    // ============================================================
    let currentSlideIndex = 0;
    const totalSlides = congratData.length;

    const textElement = document.getElementById('message-text');
    const authorElement = document.getElementById('message-author');
    const attachmentLink = document.getElementById('attachment-link');
    const scrollIndicator = document.getElementById('scroll-indicator');

    const progressContainer = document.getElementById('progress-container');
    const progressTrack = document.getElementById('progress-track');
    const progressThumb = document.getElementById('progress-thumb');

    function updateSlide(index) {
        const data = congratData[index];
        textElement.textContent = data.text;
        authorElement.textContent = data.author;

        // Управляем размером шрифта для Лизы Беляевой
        if (data.author === "Лиза Беляева") {
            textElement.classList.add('large-text');
        } else {
            textElement.classList.remove('large-text');
        }

        if (data.link) {
            attachmentLink.href = data.link;
            attachmentLink.style.display = 'flex';
        } else {
            attachmentLink.style.display = 'none';
        }

        textElement.scrollTop = 0;
        updateScrollIndicators();
    }

    function changeSlide(direction) {
        currentSlideIndex += direction;
        if (currentSlideIndex >= totalSlides) currentSlideIndex = 0;
        else if (currentSlideIndex < 0) currentSlideIndex = totalSlides - 1;
        updateSlide(currentSlideIndex);
        updateProgress(currentSlideIndex);
    }

    function updateScrollIndicators() {
        const scrollTop = textElement.scrollTop;
        const scrollHeight = textElement.scrollHeight;
        const clientHeight = textElement.clientHeight;
        const isAtBottom = (scrollTop + clientHeight >= scrollHeight - 10);

        if (isAtBottom) {
            scrollIndicator.style.display = 'none';
            if (congratData[currentSlideIndex].link) {
                attachmentLink.style.display = 'flex';
            } else {
                attachmentLink.style.display = 'none';
            }
        } else {
            scrollIndicator.style.display = 'block';
            attachmentLink.style.display = 'none';
        }
    }

    textElement.addEventListener('scroll', updateScrollIndicators);

    function updateProgress(index) {
        const percent = (index / (totalSlides - 1)) * 100;
        progressThumb.style.left = percent + '%';

        progressContainer.classList.remove('active');
        setTimeout(() => {
            progressContainer.classList.add('active');
        }, 10);

        clearTimeout(window.progressTimeout);
        window.progressTimeout = setTimeout(() => {
            progressContainer.classList.remove('active');
        }, 2000);
    }

    // Перетаскивание мышкой
    let isDragging = false;

    progressThumb.addEventListener('mousedown', (e) => {
        isDragging = true;
        e.preventDefault();
        document.addEventListener('mousemove', onMouseMove);
        document.addEventListener('mouseup', onMouseUp);
    });

    function onMouseMove(e) {
        if (!isDragging) return;
        const rect = progressTrack.getBoundingClientRect();
        let x = e.clientX - rect.left;
        x = Math.max(0, Math.min(x, rect.width));
        const percent = (x / rect.width) * 100;
        progressThumb.style.left = percent + '%';
        progressThumb.style.transition = 'none';
    }

    function onMouseUp(e) {
        if (!isDragging) return;
        isDragging = false;
        document.removeEventListener('mousemove', onMouseMove);
        document.removeEventListener('mouseup', onMouseUp);

        progressThumb.style.transition = 'left 0.4s ease';
        const rect = progressTrack.getBoundingClientRect();
        let x = e.clientX - rect.left;
        x = Math.max(0, Math.min(x, rect.width));
        const percent = (x / rect.width) * 100;
        const newIndex = Math.round((percent / 100) * (totalSlides - 1));
        currentSlideIndex = newIndex;
        updateSlide(currentSlideIndex);
        updateProgress(currentSlideIndex);
    }

    // Перетаскивание пальцем
    let isTouchDragging = false;

    progressThumb.addEventListener('touchstart', (e) => {
        isTouchDragging = true;
        e.preventDefault();
    });

    progressThumb.addEventListener('touchmove', (e) => {
        if (!isTouchDragging) return;
        e.preventDefault();
        const touch = e.touches[0];
        const rect = progressTrack.getBoundingClientRect();
        let x = touch.clientX - rect.left;
        x = Math.max(0, Math.min(x, rect.width));
        const percent = (x / rect.width) * 100;
        progressThumb.style.left = percent + '%';
        progressThumb.style.transition = 'none';
    });

    progressThumb.addEventListener('touchend', (e) => {
        if (!isTouchDragging) return;
        isTouchDragging = false;
        progressThumb.style.transition = 'left 0.4s ease';
        const rect = progressTrack.getBoundingClientRect();
        const touch = e.changedTouches[0];
        let x = touch.clientX - rect.left;
        x = Math.max(0, Math.min(x, rect.width));
        const percent = (x / rect.width) * 100;
        const newIndex = Math.round((percent / 100) * (totalSlides - 1));
        currentSlideIndex = newIndex;
        updateSlide(currentSlideIndex);
        updateProgress(currentSlideIndex);
    });

    // Клик на трек
    progressTrack.addEventListener('click', (e) => {
        if (e.target === progressThumb) return;
        const rect = progressTrack.getBoundingClientRect();
        let x = e.clientX - rect.left;
        x = Math.max(0, Math.min(x, rect.width));
        const percent = (x / rect.width) * 100;
        const newIndex = Math.round((percent / 100) * (totalSlides - 1));
        currentSlideIndex = newIndex;
        updateSlide(currentSlideIndex);
        updateProgress(currentSlideIndex);
    });

    // Адаптивность карточки
    const cardContainer = document.getElementById('card-container');
    function adjustCardShape() {
        const w = window.innerWidth;
        const h = window.innerHeight;
        if (w > h) {
            cardContainer.style.maxWidth = '500px';
            cardContainer.style.aspectRatio = '16 / 9';
        } else {
            cardContainer.style.maxWidth = '300px';
            cardContainer.style.aspectRatio = '1 / 1';
        }
    }

    window.addEventListener('load', adjustCardShape);
    window.addEventListener('resize', adjustCardShape);

    // Свайп
    let startX = 0;
    let isSwiping = false;

    cardContainer.addEventListener('touchstart', (e) => {
        if (e.target.closest('.card-text')) return;
        startX = e.touches[0].clientX;
        isSwiping = true;
    });

    cardContainer.addEventListener('touchmove', (e) => {
        if (!isSwiping) return;
        if (e.target.closest('.card-text')) return;
        e.preventDefault();
    });

    cardContainer.addEventListener('touchend', (e) => {
        if (!isSwiping) return;
        isSwiping = false;
        if (e.target.closest('.card-text')) return;
        const endX = e.changedTouches[0].clientX;
        const deltaX = endX - startX;
        if (Math.abs(deltaX) > 50) {
            if (deltaX < 0) changeSlide(1);
            else changeSlide(-1);
        }
    });

    // Клавиатура
    document.addEventListener('keydown', (e) => {
        if (e.key === 'ArrowLeft') { e.preventDefault(); changeSlide(-1); }
        else if (e.key === 'ArrowRight') { e.preventDefault(); changeSlide(1); }
    });

    // Инициализация
    updateSlide(currentSlideIndex);
    updateProgress(currentSlideIndex);

    // ============================================================
    // Ротация слов под "ТЫ": обновлённый список с "незаменимый" вместо "музыкальный"
    // ×2 для "отзывчивый" и "крутой"
    // ============================================================
    const words = ['гений', 'отзывчивый', 'крутой', 'нишевый', 'мегаумный', 'ответственный', 'добрый', 'незаменимый'];
    const wordElement = document.getElementById('dynamic-word');
    const x2Badge = document.getElementById('x2-badge');
    let wordIndex = 0;
    let x2Timer = null;

    function rotateWord() {
        clearTimeout(x2Timer);
        x2Badge.classList.remove('show');

        wordElement.style.opacity = '0';
        wordElement.style.fontSize = '32px';
        wordElement.style.fontWeight = '500';

        setTimeout(() => {
            wordIndex = (wordIndex + 1) % words.length;
            const newWord = words[wordIndex];
            wordElement.textContent = newWord;

            if (newWord === 'отзывчивый' || newWord === 'крутой') {
                x2Timer = setTimeout(() => {
                    x2Badge.classList.add('show');
                }, 1000);
            }

            wordElement.style.opacity = '1';
        }, 500);
    }

    wordElement.textContent = words[0];
    wordElement.style.opacity = '1';
    setInterval(rotateWord, 6000);

    // ============================================================
    // Падающие котики
    // ============================================================
    const catEmojis = ['🐱', '😸', '😹', '😻', '😺'];

    document.addEventListener('click', function(e) {
        if (!splashScreen.classList.contains('hidden')) return;
        if (e.target.closest('button') || e.target.closest('.card-container') || e.target.closest('a')) return;

        const emoji = catEmojis[Math.floor(Math.random() * catEmojis.length)];
        const cat = document.createElement('div');
        cat.className = 'falling-cat';
        cat.textContent = emoji;
        cat.style.left = (e.clientX - 30) + 'px';
        cat.style.top = (e.clientY - 30) + 'px';
        document.body.appendChild(cat);
        setTimeout(() => cat.remove(), 2800);
    });
